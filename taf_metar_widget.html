<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="TAF and METAR weather data for aerodromes">
    <link rel="manifest" href="manifest.json">
    <title>TAF/METARS Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: rgb(126, 120, 88);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .input-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .input-group input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
            text-transform: uppercase;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-container {
            text-align: center;
            margin: 30px 0;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .results-section {
            margin-top: 30px;
        }

        .aerodrome-result {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }

        .aerodrome-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .aerodrome-codes {
            font-size: 1.3em;
            font-weight: 700;
            color: #333;
        }

        .iata-code {
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .weather-data {
            margin-top: 15px;
        }

        .weather-type {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .weather-content {
            background: white;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            line-height: 1.6;
            color: #333;
            margin-bottom: 15px;
            word-wrap: break-word;
        }

        .error {
            color: #dc3545;
            font-style: italic;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.1em;
            margin: 20px 0;
        }

        .no-data {
            color: #888;
            font-style: italic;
        }

        .logo {
            display: block;
            margin: 0 auto 20px;
            max-width: 200px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="c:\Users\nevho\Code\@QCLogo\QC_Logo_Small_241206.png" alt="QC Logo" class="logo">
        <h1>TAF/METARS</h1>

        <div class="input-section">
            <div class="input-group">
                <label for="icao1">ICAO Code 1:</label>
                <input type="text" id="icao1" maxlength="4" placeholder="e.g., KJFK">
            </div>
            <div class="input-group">
                <label for="icao2">ICAO Code 2:</label>
                <input type="text" id="icao2" maxlength="4" placeholder="e.g., EGLL">
            </div>
            <div class="input-group">
                <label for="icao3">ICAO Code 3:</label>
                <input type="text" id="icao3" maxlength="4" placeholder="e.g., YSSY">
            </div>
        </div>

        <div class="button-container">
            <button id="updateBtn" onclick="fetchWeatherData()">Update Weather Data</button>
        </div>

        <div id="results" class="results-section"></div>
    </div>

    <script>
        // ICAO to IATA mapping (common airports)
        const icaoToIata = {
            'KJFK': 'JFK', 'KLAX': 'LAX', 'KORD': 'ORD', 'KATL': 'ATL', 'KDFW': 'DFW',
            'KDEN': 'DEN', 'KSFO': 'SFO', 'KLAS': 'LAS', 'KMIA': 'MIA', 'KBOS': 'BOS',
            'EGLL': 'LHR', 'EGKK': 'LGW', 'EHAM': 'AMS', 'EDDF': 'FRA', 'LFPG': 'CDG',
            'LEMD': 'MAD', 'LIRF': 'FCO', 'LOWW': 'VIE', 'EBBR': 'BRU', 'LSZH': 'ZRH',
            'YSSY': 'SYD', 'YMML': 'MEL', 'YBBN': 'BNE', 'YPPH': 'PER', 'NZAA': 'AKL',
            'RJTT': 'HND', 'RJBB': 'KIX', 'VHHH': 'HKG', 'WSSS': 'SIN', 'VTBS': 'BKK',
            'OMDB': 'DXB', 'OTHH': 'DOH', 'OEJN': 'JED', 'CYYZ': 'YYZ', 'CYVR': 'YVR'
        };

        function getIataCode(icao) {
            return icaoToIata[icao.toUpperCase()] || 'N/A';
        }

        async function fetchWeatherData() {
            const icao1 = document.getElementById('icao1').value.trim().toUpperCase();
            const icao2 = document.getElementById('icao2').value.trim().toUpperCase();
            const icao3 = document.getElementById('icao3').value.trim().toUpperCase();

            const icaoCodes = [icao1, icao2, icao3].filter(code => code.length === 4);

            if (icaoCodes.length === 0) {
                alert('Please enter at least one valid ICAO code (4 characters)');
                return;
            }

            const resultsDiv = document.getElementById('results');
            const updateBtn = document.getElementById('updateBtn');

            resultsDiv.innerHTML = '<div class="loading">Loading weather data...</div>';
            updateBtn.disabled = true;

            try {
                const results = await Promise.all(
                    icaoCodes.map(icao => fetchAerodromeData(icao))
                );

                displayResults(results);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Error fetching weather data: ${error.message}</div>`;
            } finally {
                updateBtn.disabled = false;
            }
        }

        async function fetchAerodromeData(icao) {
            const result = {
                icao: icao,
                iata: getIataCode(icao),
                taf: null,
                metar: null,
                error: null
            };

            try {
                // Using CORS proxy to fetch data
                const corsProxy = 'https://api.allorigins.win/raw?url=';

                // Fetch METAR
                try {
                    const metarUrl = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=raw`;
                    const metarResponse = await fetch(corsProxy + encodeURIComponent(metarUrl));
                    if (metarResponse.ok) {
                        const metarText = await metarResponse.text();
                        const cleanMetar = metarText.trim();
                        if (cleanMetar && cleanMetar.length > 0 && !cleanMetar.includes('error')) {
                            result.metar = cleanMetar;
                        }
                    }
                } catch (e) {
                    console.error('METAR fetch error:', e);
                }

                // Fetch TAF
                try {
                    const tafUrl = `https://aviationweather.gov/api/data/taf?ids=${icao}&format=raw`;
                    const tafResponse = await fetch(corsProxy + encodeURIComponent(tafUrl));
                    if (tafResponse.ok) {
                        const tafText = await tafResponse.text();
                        const cleanTaf = tafText.trim();
                        if (cleanTaf && cleanTaf.length > 0 && !cleanTaf.includes('error')) {
                            result.taf = cleanTaf;
                        }
                    }
                } catch (e) {
                    console.error('TAF fetch error:', e);
                }

                if (!result.taf && !result.metar) {
                    result.error = 'No data available for this aerodrome';
                }
            } catch (error) {
                result.error = `Failed to fetch data: ${error.message}`;
            }

            return result;
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            results.forEach(result => {
                const aerodromeDiv = document.createElement('div');
                aerodromeDiv.className = 'aerodrome-result';

                const headerDiv = document.createElement('div');
                headerDiv.className = 'aerodrome-header';
                headerDiv.innerHTML = `
                    <div class="aerodrome-codes">${result.icao}</div>
                    <div class="iata-code">IATA: ${result.iata}</div>
                `;
                aerodromeDiv.appendChild(headerDiv);

                if (result.error) {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'error';
                    errorDiv.textContent = result.error;
                    aerodromeDiv.appendChild(errorDiv);
                } else {
                    // TAF section
                    const tafSection = document.createElement('div');
                    tafSection.className = 'weather-data';
                    tafSection.innerHTML = `
                        <div class="weather-type">TAF (Terminal Aerodrome Forecast):</div>
                        <div class="weather-content ${result.taf ? '' : 'no-data'}">
                            ${result.taf || 'No TAF data available'}
                        </div>
                    `;
                    aerodromeDiv.appendChild(tafSection);

                    // METAR section
                    const metarSection = document.createElement('div');
                    metarSection.className = 'weather-data';
                    metarSection.innerHTML = `
                        <div class="weather-type">METAR (Meteorological Aerodrome Report):</div>
                        <div class="weather-content ${result.metar ? '' : 'no-data'}">
                            ${result.metar || 'No METAR data available'}
                        </div>
                    `;
                    aerodromeDiv.appendChild(metarSection);
                }

                resultsDiv.appendChild(aerodromeDiv);
            });
        }

        // Allow pressing Enter in input fields to trigger update
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    fetchWeatherData();
                }
            });
        });

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then((registration) => {
                    console.log('Service Worker registered:', registration);
                })
                .catch((error) => {
                    console.log('Service Worker registration failed:', error);
                });
        }
    </script>
</body>
</html>
