<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Aviation | Airline Regional News Intelligence Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        /* ── CSS Reset & Body ─────────────────────────────────── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0a0e1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ───────────────────────────────────────────── */
        .header {
            position: sticky;
            top: 0;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b2a4a 100%);
            border-bottom: 2px solid #d4a843;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .header-logo {
            height: 72px;
            width: auto;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #d4a843;
            letter-spacing: 0.5px;
        }
        .header h1 span {
            color: #8fadc8;
            font-weight: 400;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .update-btn {
            background: linear-gradient(135deg, #d4a843 0%, #b8912e 100%);
            color: #0a0e1a;
            border: none;
            padding: 6px 18px;
            border-radius: 6px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .update-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212, 168, 67, 0.3);
        }
        .update-btn svg {
            width: 14px;
            height: 14px;
        }
        .cross-launch-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #8fadc8;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 6px 18px;
            border-radius: 6px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .cross-launch-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }
        .bookmark-toggle-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #d4a843;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 6px 18px;
            border-radius: 6px;
            font-family: Arial, sans-serif;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .bookmark-toggle-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.1);
        }
        .auto-refresh-select {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 5px;
            color: #e0e0e0;
            padding: 6px 10px;
            font-size: 11px;
            font-family: Arial, sans-serif;
        }
        .auto-refresh-select.active {
            border-color: #4caf50;
            animation: pulse-green 2s ease-in-out infinite;
        }
        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(76,175,80,0); }
            50% { box-shadow: 0 0 8px 2px rgba(76,175,80,0.3); }
        }
        .last-updated {
            font-size: 11px;
            color: #8fadc8;
        }

        /* ── Two-Panel Layout ─────────────────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #mapPanel {
            height: 40vh;
            min-height: 250px;
            position: relative;
            border-bottom: 1px solid rgba(212, 168, 67, 0.2);
        }
        #mapPanel .leaflet-container { height: 100%; width: 100%; }
        #feedPanel {
            flex: 1;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @media (max-height: 900px) {
            #mapPanel { height: 30vh; }
        }

        /* ── All Regions Button ───────────────────────────────── */
        .all-regions-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 999;
            background: rgba(13, 27, 42, 0.9);
            border: 1px solid #d4a843;
            color: #d4a843;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }
        .all-regions-btn:hover { background: rgba(212, 168, 67, 0.2); }

        /* ── Feed Toolbar ─────────────────────────────────────── */
        .feed-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            border-bottom: 1px solid rgba(212, 168, 67, 0.15);
            background: #0d1117;
            flex-wrap: wrap;
        }
        .region-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #e0e0e0;
        }
        .region-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d4a843;
        }
        .category-filters {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .category-btn {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-family: Arial, sans-serif;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.06);
            color: #8fadc8;
        }
        .category-btn.active {
            border-color: var(--cat-color);
            color: var(--cat-color);
            background: color-mix(in srgb, var(--cat-color) 12%, transparent);
        }
        .feed-count {
            font-size: 11px;
            color: #6b7b8d;
            margin-left: auto;
        }

        /* ── Feed List & Items ────────────────────────────────── */
        .feed-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        .feed-item {
            display: grid;
            grid-template-columns: 90px 1fr auto auto auto;
            gap: 12px;
            align-items: center;
            padding: 10px 16px;
            border-left: 3px solid transparent;
            transition: all 0.15s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        .feed-item:hover {
            background: rgba(212, 168, 67, 0.04);
            border-left-color: #d4a843;
        }
        .feed-date {
            font-size: 11px;
            color: #6b7b8d;
            font-family: monospace;
        }
        .feed-body {
            min-width: 0;
        }
        .feed-title {
            font-size: 13px;
            color: #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .feed-title a {
            color: #e0e0e0;
            text-decoration: none;
        }
        .feed-title a:hover {
            color: #d4a843;
        }
        .feed-source {
            font-size: 10px;
            color: #6b7b8d;
            margin-top: 2px;
        }
        .region-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .feed-badges {
            display: flex;
            gap: 4px;
        }
        .feed-badges .badge {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 8px;
        }
        .feed-star {
            cursor: pointer;
            font-size: 16px;
            color: #555;
            transition: color 0.2s;
            opacity: 0;
        }
        .feed-item:hover .feed-star {
            opacity: 1;
        }
        .feed-star:hover,
        .feed-star.bookmarked {
            color: #d4a843;
            opacity: 1;
        }
        .feed-empty,
        .feed-loading {
            padding: 40px;
            text-align: center;
            color: #6b7b8d;
            font-size: 13px;
        }

        /* ── Context Menu ────────────────────────────────────────── */
        .ctx-menu {
            position: fixed;
            background: #1a2636;
            border: 1px solid rgba(212,168,67,0.3);
            border-radius: 8px;
            padding: 6px 0;
            z-index: 5000;
            display: none;
            min-width: 240px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .ctx-item {
            padding: 8px 16px;
            font-size: 12px;
            color: #c0c8d0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.15s;
        }
        .ctx-item:hover {
            background: rgba(212,168,67,0.1);
            color: #e0e0e0;
        }
        .ctx-icon {
            font-size: 14px;
            width: 18px;
            text-align: center;
            color: #d4a843;
        }
        .ctx-divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 4px 0;
        }

        /* ── Curation Sidebar ────────────────────────────────────── */
        .curation-sidebar {
            position: fixed;
            top: 0; right: -420px; bottom: 0;
            width: 420px;
            background: #111827;
            border-left: 1px solid rgba(212,168,67,0.3);
            z-index: 2000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 24px rgba(0,0,0,0.4);
        }
        .curation-sidebar.open { right: 0; }
        .curation-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1999;
            display: none;
        }
        .curation-overlay.open { display: block; }
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(212,168,67,0.2);
        }
        .sidebar-header h3 {
            color: #d4a843;
            font-size: 15px;
            font-weight: 700;
        }
        .sidebar-close {
            background: none;
            border: none;
            color: #8fadc8;
            font-size: 22px;
            cursor: pointer;
            padding: 0 4px;
        }
        .sidebar-close:hover { color: #e0e0e0; }
        .sidebar-filters {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-wrap: wrap;
        }
        .sidebar-filters input,
        .sidebar-filters select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 5px;
            color: #e0e0e0;
            padding: 6px 10px;
            font-size: 11px;
            font-family: Arial, sans-serif;
            flex: 1;
            min-width: 80px;
        }
        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .saved-item {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
        }
        .saved-item:hover {
            background: rgba(212,168,67,0.04);
        }
        .saved-item-title {
            font-size: 13px;
            color: #e0e0e0;
            margin-bottom: 4px;
        }
        .saved-item-title a {
            color: #e0e0e0;
            text-decoration: none;
        }
        .saved-item-title a:hover { color: #d4a843; }
        .saved-item-meta {
            font-size: 10px;
            color: #6b7b8d;
            margin-bottom: 6px;
        }
        .saved-item-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        .tag-chip {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(212,168,67,0.15);
            color: #d4a843;
        }
        .saved-item-notes {
            font-size: 11px;
            color: #8fadc8;
            font-style: italic;
            margin-bottom: 4px;
        }
        .saved-item-actions {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .saved-item-actions button {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #8fadc8;
            font-size: 10px;
            padding: 3px 8px;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }
        .saved-item-actions button:hover { background: rgba(255,255,255,0.12); color: #e0e0e0; }
        .saved-item-actions button.delete-btn:hover { color: #f44336; border-color: #f44336; }
        .sidebar-actions {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            border-top: 1px solid rgba(212,168,67,0.2);
        }
        .sidebar-actions button {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 5px;
            background: rgba(255,255,255,0.06);
            color: #8fadc8;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: Arial, sans-serif;
        }
        .sidebar-actions button:hover { background: rgba(255,255,255,0.12); }
    </style>
</head>
<body>

    <!-- ── Header ─────────────────────────────────────────────── -->
    <div class="header">
        <div class="header-left">
            <img class="header-logo" src="../Branding_Assets/QC_Logo_Small_241206.png" alt="QC Aviation">
            <h1>Airline Regional News Intelligence <span>| Dashboard</span></h1>
        </div>
        <div class="header-right">
            <span class="last-updated" id="lastUpdated"></span>
            <select class="auto-refresh-select" id="autoRefreshSelect">
                <option value="0">Auto-refresh: Off</option>
                <option value="300000">Auto-refresh: 5 min</option>
                <option value="900000">Auto-refresh: 15 min</option>
                <option value="1800000">Auto-refresh: 30 min</option>
            </select>
            <button class="update-btn" id="refreshBtn" onclick="refreshFeeds()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                Refresh
            </button>
            <button class="bookmark-toggle-btn" id="bookmarkToggle" onclick="toggleCurationSidebar()">&#9733; Saved</button>
            <button class="cross-launch-btn" onclick="window.open('QC_Aircraft_Market_Dashboard.html','_blank')">Market Dashboard &#8599;</button>
        </div>
    </div>

    <!-- ── Two-Panel Body ─────────────────────────────────────── -->
    <div class="main-content">
        <div id="mapPanel">
            <div id="map"></div>
            <button class="all-regions-btn" id="allRegionsBtn" onclick="selectAllRegions()">All Regions</button>
        </div>
        <div id="feedPanel">
            <div class="feed-toolbar" id="feedToolbar">
                <div class="region-indicator" id="regionIndicator">
                    <span class="region-dot" id="regionDot"></span>
                    <span id="regionName">All Regions</span>
                </div>
                <div class="category-filters" id="categoryFilters"></div>
                <span class="feed-count" id="feedCount"></span>
            </div>
            <div class="feed-list" id="feedList">
                <div class="feed-empty">Select a region on the map to load news, or click "All Regions".</div>
            </div>
        </div>
    </div>

    <!-- ── Curation Sidebar ─────────────────────────────────────── -->
    <div class="curation-overlay" id="curationOverlay" onclick="toggleCurationSidebar()"></div>
    <div class="curation-sidebar" id="curationSidebar">
        <div class="sidebar-header">
            <h3>&#9733; Saved Items</h3>
            <button class="sidebar-close" onclick="toggleCurationSidebar()">&times;</button>
        </div>
        <div class="sidebar-filters">
            <input type="text" id="sidebarSearch" placeholder="Search saved items..." oninput="renderSavedItems()">
            <select id="sidebarRegionFilter" onchange="renderSavedItems()">
                <option value="all">All Regions</option>
            </select>
            <select id="sidebarCategoryFilter" onchange="renderSavedItems()">
                <option value="all">All Categories</option>
            </select>
            <select id="sidebarTagFilter" onchange="renderSavedItems()">
                <option value="all">All Tags</option>
            </select>
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
        <div class="sidebar-actions">
            <button onclick="exportBookmarks('csv')">Export CSV</button>
            <button onclick="exportBookmarks('json')">Export JSON</button>
            <button onclick="clearAllBookmarks()" style="color:#f44336;">Clear All</button>
        </div>
    </div>

    <!-- ── JavaScript ─────────────────────────────────────────── -->
    <script>
    /* ================================================================
       QC Airline Regional News Intelligence Dashboard
       Tasks 1–3: Shell, Map, Feed Toolbar & Rendering
       ================================================================ */

    // ── Region Configuration ─────────────────────────────────────

    // ── Category Configuration ───────────────────────────────────
    const CATEGORIES = {
        operations:  { label: 'Operations',   color: '#4da6ff', keywords: ['operations','fleet','maintenance','crew','pilot','schedule','capacity','codeshare'] },
        orders:      { label: 'Orders',       color: '#4caf50', keywords: ['order','firm order','purchase','commit','agreement','loi','mou','backlog','delivery'] },
        routes:      { label: 'Routes',       color: '#d4a843', keywords: ['route','destination','frequency','hub','network','nonstop','inaugural'] },
        newairlines: { label: 'New Airlines',  color: '#e91e63', keywords: ['startup','new airline','aoc','first flight','maiden','commence'] },
        disruptions: { label: 'Disruptions',  color: '#f44336', keywords: ['cancel','delay','suspend','ground','strike','disruption','divert','emergency'] }
    };

    // ── State ────────────────────────────────────────────────────
    let selectedRegion = null;
    let allNewsItems = [];
    let activeCategories = new Set(Object.keys(CATEGORIES));
    const regionLayers = {};

    // ── Initialise Leaflet Map ───────────────────────────────────
    const map = L.map('map', {
        center: [25, 65],
        zoom: 3,
        zoomControl: true,
        attributionControl: false
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 18,
        subdomains: 'abcd'
    }).addTo(map);

    // ── Draw Region Polygons ─────────────────────────────────────
    Object.entries(REGION_FEEDS).forEach(([key, region]) => {
        const polygon = L.polygon(region.coords, {
            color: region.color,
            weight: 2,
            fillColor: region.color,
            fillOpacity: 0.2
        }).addTo(map);

        polygon.bindTooltip(region.label, {
            sticky: true,
            className: 'region-tooltip'
        });

        polygon.on('mouseover', function () {
            if (selectedRegion !== key) {
                this.setStyle({ fillOpacity: 0.4 });
            }
        });
        polygon.on('mouseout', function () {
            if (selectedRegion !== key) {
                this.setStyle({ fillOpacity: 0.2 });
            }
        });
        polygon.on('click', function () {
            selectRegion(key);
        });

        regionLayers[key] = polygon;
    });

    // ── Region Selection ─────────────────────────────────────────
    function selectRegion(regionKey) {
        selectedRegion = regionKey;
        Object.keys(regionLayers).forEach(k => {
            regionLayers[k].setStyle({ weight: 2, fillOpacity: 0.2 });
        });
        regionLayers[regionKey].setStyle({ weight: 4, fillOpacity: 0.35 });
        updateRegionIndicator(regionKey);
        loadRegionNews(regionKey);
    }

    function selectAllRegions() {
        selectedRegion = null;
        Object.keys(regionLayers).forEach(k => {
            regionLayers[k].setStyle({ weight: 2, fillOpacity: 0.2 });
        });
        updateRegionIndicator(null);
        loadAllRegionsNews();
    }

    function updateRegionIndicator(regionKey) {
        const dot = document.getElementById('regionDot');
        const name = document.getElementById('regionName');
        if (regionKey && REGION_FEEDS[regionKey]) {
            dot.style.background = REGION_FEEDS[regionKey].color;
            name.textContent = REGION_FEEDS[regionKey].label;
        } else {
            dot.style.background = '#d4a843';
            name.textContent = 'All Regions';
        }
    }

    // ── RSS Feed Fetching ────────────────────────────────────────
    let regionCache = {};

    async function fetchSingleFeed(feedUrl, feedLabel) {
        const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(feedUrl);
        try {
            const resp = await fetch(proxyUrl);
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const text = await resp.text();
            const parser = new DOMParser();
            const xml = parser.parseFromString(text, 'text/xml');
            const items = xml.querySelectorAll('item');
            const results = [];
            items.forEach(item => {
                const title = (item.querySelector('title') || {}).textContent || '';
                const link = (item.querySelector('link') || {}).textContent || '';
                const pubDate = (item.querySelector('pubDate') || {}).textContent || '';
                const source = (item.querySelector('source') || {}).textContent || feedLabel;
                results.push({
                    title, link, pubDate,
                    date: pubDate ? new Date(pubDate) : new Date(0),
                    source, feedLabel
                });
            });
            return results;
        } catch (err) {
            console.warn('Feed fetch failed for ' + feedLabel + ':', err);
            return [];
        }
    }

    async function fetchRegionFeeds(regionKey) {
        const region = REGION_FEEDS[regionKey];
        const promises = region.feeds.map(f => fetchSingleFeed(f.url, f.label));
        const results = await Promise.all(promises);
        const items = results.flat().map(item => ({ ...item, region: regionKey }));
        const deduped = deduplicateItems(items);
        deduped.sort((a, b) => b.date - a.date);
        return deduped.slice(0, 100);
    }

    function deduplicateItems(items) {
        const seen = new Set();
        return items.filter(item => {
            const key = item.title.toLowerCase().replace(/[^a-z0-9]/g, '').substring(0, 60);
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });
    }

    // ── Feed Loading ──────────────────────────────────────────────
    async function loadRegionNews(regionKey) {
        const feedList = document.getElementById('feedList');
        const region = REGION_FEEDS[regionKey];
        feedList.innerHTML = '<div class="feed-loading">Fetching news for ' + region.label + '...</div>';
        try {
            if (!regionCache[regionKey]) {
                regionCache[regionKey] = await fetchRegionFeeds(regionKey);
            }
            allNewsItems = regionCache[regionKey];
            renderFeedItems();
            updateLastRefreshed();
            updateRegionCount(regionKey);
        } catch (err) {
            feedList.innerHTML = '<div class="feed-empty">Unable to load news for ' + region.label + '. Check your internet connection and try Refresh.</div>';
        }
    }

    async function loadAllRegionsNews() {
        const feedList = document.getElementById('feedList');
        feedList.innerHTML = '<div class="feed-loading">Fetching news for all regions...</div>';
        try {
            const regionKeys = Object.keys(REGION_FEEDS);
            const promises = regionKeys.map(async key => {
                if (!regionCache[key]) {
                    regionCache[key] = await fetchRegionFeeds(key);
                }
                return regionCache[key];
            });
            const results = await Promise.all(promises);
            allNewsItems = deduplicateItems(results.flat());
            allNewsItems.sort((a, b) => b.date - a.date);
            renderFeedItems();
            updateLastRefreshed();
        } catch (err) {
            feedList.innerHTML = '<div class="feed-empty">Unable to load news. Check your internet connection and try Refresh.</div>';
        }
    }

    // ── Category Detection ───────────────────────────────────────
    function detectCategories(title) {
        const results = [];
        const lower = title.toLowerCase();
        Object.entries(CATEGORIES).forEach(([key, cat]) => {
            const matched = cat.keywords.some(kw => {
                const regex = new RegExp('\\b' + kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
                return regex.test(lower);
            });
            if (matched) results.push(key);
        });
        return results;
    }

    // ── Category Filter Buttons ──────────────────────────────────
    function buildCategoryFilters() {
        const container = document.getElementById('categoryFilters');
        container.innerHTML = Object.entries(CATEGORIES).map(([key, cat]) => {
            return '<button class="category-btn active" data-cat="' + key + '" ' +
                   'style="--cat-color:' + cat.color + '" ' +
                   'onclick="toggleCategory(\'' + key + '\', this)">' +
                   cat.label + '</button>';
        }).join('');
    }

    function toggleCategory(catKey, btn) {
        if (activeCategories.has(catKey)) {
            activeCategories.delete(catKey);
            btn.classList.remove('active');
        } else {
            activeCategories.add(catKey);
            btn.classList.add('active');
        }
        renderFeedItems();
    }

    // ── Date Formatting (DDMMMYYYY) ─────────────────────────────
    function formatNewsDate(d) {
        if (!d || isNaN(d.getTime())) return '\u2014';
        const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        const dd = String(d.getDate()).padStart(2, '0');
        return dd + months[d.getMonth()] + d.getFullYear();
    }

    // ── Utilities ────────────────────────────────────────────────
    function generateItemId(item) {
        const titleKey = item.title.toLowerCase().replace(/[^a-z0-9]/g, '').substring(0, 60);
        const dateKey = item.date ? item.date.toISOString().split('T')[0] : '';
        return titleKey + '|' + dateKey;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ── Bookmark & Curation Functions ────────────────────────────
    function getBookmarks() {
        try { return JSON.parse(localStorage.getItem('qc_news_bookmarks') || '[]'); }
        catch (e) { return []; }
    }

    function saveBookmarks(bookmarks) {
        localStorage.setItem('qc_news_bookmarks', JSON.stringify(bookmarks));
    }

    function getTags() {
        try { return JSON.parse(localStorage.getItem('qc_news_tags') || '[]'); }
        catch (e) { return []; }
    }

    function saveTags(tags) {
        localStorage.setItem('qc_news_tags', JSON.stringify([...new Set(tags)]));
    }

    function isBookmarked(itemId) {
        return getBookmarks().some(b => b.id === itemId);
    }

    function bookmarkItem(newsItem) {
        if (!newsItem) return;
        const id = generateItemId(newsItem);
        const bookmarks = getBookmarks();
        if (bookmarks.some(b => b.id === id)) return;

        const categories = detectCategories(newsItem.title);
        bookmarks.unshift({
            id: id,
            title: newsItem.title,
            link: newsItem.link,
            source: newsItem.source,
            date: newsItem.date ? newsItem.date.toISOString() : '',
            region: newsItem.region || '',
            categories: categories,
            tags: [],
            notes: '',
            bookmarkedAt: new Date().toISOString()
        });
        saveBookmarks(bookmarks);
        renderFeedItems();
        showToast('Bookmarked: ' + newsItem.title.substring(0, 50) + '...');
    }

    function bookmarkFromFeed(el) {
        const itemId = el.dataset.id;
        const newsItem = allNewsItems.find(i => generateItemId(i) === itemId);
        if (newsItem) bookmarkItem(newsItem);
    }

    function deleteBookmark(itemId) {
        const bookmarks = getBookmarks().filter(b => b.id !== itemId);
        saveBookmarks(bookmarks);
        renderSavedItems();
        renderFeedItems();
    }

    function addTagsToBookmark(itemId) {
        const bookmarks = getBookmarks();
        const bm = bookmarks.find(b => b.id === itemId);
        if (!bm) return;

        const existing = bm.tags.join(', ');
        const input = prompt('Tags (comma-separated):', existing);
        if (input === null) return;

        bm.tags = input.split(',').map(t => t.trim()).filter(Boolean);
        saveBookmarks(bookmarks);

        const allTags = getTags().concat(bm.tags);
        saveTags(allTags);
        renderSavedItems();
    }

    function addNotesToBookmark(itemId) {
        const bookmarks = getBookmarks();
        const bm = bookmarks.find(b => b.id === itemId);
        if (!bm) return;

        const input = prompt('Notes:', bm.notes);
        if (input === null) return;

        bm.notes = input;
        saveBookmarks(bookmarks);
        renderSavedItems();
    }

    function toggleCurationSidebar() {
        document.getElementById('curationSidebar').classList.toggle('open');
        document.getElementById('curationOverlay').classList.toggle('open');
        if (document.getElementById('curationSidebar').classList.contains('open')) {
            renderSavedItems();
            populateSidebarFilters();
        }
    }

    function populateSidebarFilters() {
        // Region dropdown
        const regionSelect = document.getElementById('sidebarRegionFilter');
        const currentRegionVal = regionSelect.value;
        regionSelect.innerHTML = '<option value="all">All Regions</option>';
        Object.entries(REGION_FEEDS).forEach(([key, r]) => {
            regionSelect.innerHTML += '<option value="' + key + '">' + r.label + '</option>';
        });
        regionSelect.value = currentRegionVal;

        // Category dropdown
        const catSelect = document.getElementById('sidebarCategoryFilter');
        const currentCatVal = catSelect.value;
        catSelect.innerHTML = '<option value="all">All Categories</option>';
        Object.entries(CATEGORIES).forEach(([key, c]) => {
            catSelect.innerHTML += '<option value="' + key + '">' + c.label + '</option>';
        });
        catSelect.value = currentCatVal;

        // Tag dropdown
        const tagSelect = document.getElementById('sidebarTagFilter');
        const currentTagVal = tagSelect.value;
        tagSelect.innerHTML = '<option value="all">All Tags</option>';
        const allTags = getTags();
        allTags.forEach(tag => {
            tagSelect.innerHTML += '<option value="' + escapeHtml(tag) + '">' + escapeHtml(tag) + '</option>';
        });
        tagSelect.value = currentTagVal;
    }

    function renderSavedItems() {
        const list = document.getElementById('sidebarList');
        let bookmarks = getBookmarks();

        // Apply filters
        const search = (document.getElementById('sidebarSearch').value || '').toLowerCase();
        const regionFilter = document.getElementById('sidebarRegionFilter').value;
        const catFilter = document.getElementById('sidebarCategoryFilter').value;
        const tagFilter = document.getElementById('sidebarTagFilter').value;

        if (search) {
            bookmarks = bookmarks.filter(b =>
                b.title.toLowerCase().includes(search) ||
                (b.notes && b.notes.toLowerCase().includes(search))
            );
        }
        if (regionFilter !== 'all') {
            bookmarks = bookmarks.filter(b => b.region === regionFilter);
        }
        if (catFilter !== 'all') {
            bookmarks = bookmarks.filter(b => b.categories && b.categories.includes(catFilter));
        }
        if (tagFilter !== 'all') {
            bookmarks = bookmarks.filter(b => b.tags && b.tags.includes(tagFilter));
        }

        if (bookmarks.length === 0) {
            list.innerHTML = '<div class="feed-empty">No saved items' + (search || regionFilter !== 'all' || catFilter !== 'all' || tagFilter !== 'all' ? ' matching filters' : '') + '.</div>';
            return;
        }

        list.innerHTML = bookmarks.map(b => {
            const region = REGION_FEEDS[b.region];
            const dateStr = b.date ? formatNewsDate(new Date(b.date)) : '\u2014';
            const tags = (b.tags || []).map(t => '<span class="tag-chip">' + escapeHtml(t) + '</span>').join('');
            const notes = b.notes ? '<div class="saved-item-notes">' + escapeHtml(b.notes) + '</div>' : '';
            const regionBadge = region ? '<span class="region-badge" style="background:' + region.color + '22;color:' + region.color + '">' + region.label + '</span>' : '';

            return '<div class="saved-item">' +
                '<div class="saved-item-title"><a href="' + (b.link || '#') + '" target="_blank" rel="noopener">' + escapeHtml(b.title) + '</a></div>' +
                '<div class="saved-item-meta">' + dateStr + ' &bull; ' + escapeHtml(b.source || '') + ' ' + regionBadge + '</div>' +
                (tags ? '<div class="saved-item-tags">' + tags + '</div>' : '') +
                notes +
                '<div class="saved-item-actions">' +
                    '<button onclick="addTagsToBookmark(\'' + b.id.replace(/'/g, "\\'") + '\')">Tags</button>' +
                    '<button onclick="addNotesToBookmark(\'' + b.id.replace(/'/g, "\\'") + '\')">Notes</button>' +
                    '<button class="delete-btn" onclick="deleteBookmark(\'' + b.id.replace(/'/g, "\\'") + '\')">Delete</button>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    function exportBookmarks(format) {
        const bookmarks = getBookmarks();
        if (bookmarks.length === 0) { alert('No bookmarks to export.'); return; }

        let content, filename, mimeType;
        if (format === 'json') {
            content = JSON.stringify(bookmarks, null, 2);
            filename = 'qc_news_bookmarks_' + new Date().toISOString().split('T')[0] + '.json';
            mimeType = 'application/json';
        } else {
            const header = 'Date,Title,Source,Region,Categories,Tags,Notes,Link';
            const esc = s => '"' + String(s||'').replace(/"/g,'""') + '"';
            const rows = bookmarks.map(b => {
                return [esc(b.date), esc(b.title), esc(b.source), esc(b.region),
                        esc((b.categories||[]).join(';')), esc((b.tags||[]).join(';')),
                        esc(b.notes), esc(b.link)].join(',');
            });
            content = header + '\n' + rows.join('\n');
            filename = 'qc_news_bookmarks_' + new Date().toISOString().split('T')[0] + '.csv';
            mimeType = 'text/csv';
        }

        const blob = new Blob([content], { type: mimeType });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    function clearAllBookmarks() {
        if (!confirm('Delete all saved bookmarks? This cannot be undone.')) return;
        saveBookmarks([]);
        renderSavedItems();
        renderFeedItems();
        showToast('All bookmarks cleared.');
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1e2a38;border:1px solid #4caf50;border-radius:8px;padding:12px 20px;color:#4caf50;font-size:13px;font-weight:600;z-index:10002;box-shadow:0 4px 16px rgba(0,0,0,0.4);';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    // ── Context Menu ──────────────────────────────────────────────
    const ctxMenu = document.createElement('div');
    ctxMenu.className = 'ctx-menu';
    ctxMenu.innerHTML =
        '<div class="ctx-item" data-action="bookmark"><span class="ctx-icon">&#9733;</span>Bookmark</div>' +
        '<div class="ctx-item" data-action="tags"><span class="ctx-icon">&#9868;</span>Add Tags</div>' +
        '<div class="ctx-item" data-action="notes"><span class="ctx-icon">&#9998;</span>Add Notes</div>' +
        '<div class="ctx-divider"></div>' +
        '<div class="ctx-item" data-action="push-order"><span class="ctx-icon">+</span>Push to Market Dashboard Orders</div>' +
        '<div class="ctx-divider"></div>' +
        '<div class="ctx-item" data-action="open"><span class="ctx-icon">&#8599;</span>Open Article</div>';
    document.body.appendChild(ctxMenu);

    let ctxTargetItem = null;

    document.addEventListener('contextmenu', function(e) {
        const feedItem = e.target.closest('.feed-item');
        if (!feedItem) return;
        e.preventDefault();

        const itemId = feedItem.dataset.id;
        ctxTargetItem = allNewsItems.find(i => generateItemId(i) === itemId) || null;

        ctxMenu.style.left = e.clientX + 'px';
        ctxMenu.style.top = e.clientY + 'px';
        ctxMenu.style.display = 'block';

        const rect = ctxMenu.getBoundingClientRect();
        if (rect.right > window.innerWidth) ctxMenu.style.left = (e.clientX - rect.width) + 'px';
        if (rect.bottom > window.innerHeight) ctxMenu.style.top = (e.clientY - rect.height) + 'px';
    });

    document.addEventListener('click', () => ctxMenu.style.display = 'none');
    document.addEventListener('keydown', e => { if (e.key === 'Escape') ctxMenu.style.display = 'none'; });

    function ensureBookmarked(newsItem) {
        const id = generateItemId(newsItem);
        if (!isBookmarked(id)) bookmarkItem(newsItem);
        return id;
    }

    function showOrderModal(item) {
        showToast('Push to Orders will be available soon.');
    }

    ctxMenu.addEventListener('click', function(e) {
        const item = e.target.closest('.ctx-item');
        if (!item || !ctxTargetItem) return;
        const action = item.dataset.action;
        ctxMenu.style.display = 'none';

        switch (action) {
            case 'bookmark':
                bookmarkItem(ctxTargetItem);
                break;
            case 'tags': {
                const id = ensureBookmarked(ctxTargetItem);
                addTagsToBookmark(id);
                break;
            }
            case 'notes': {
                const id = ensureBookmarked(ctxTargetItem);
                addNotesToBookmark(id);
                break;
            }
            case 'push-order':
                showOrderModal(ctxTargetItem);
                break;
            case 'open':
                window.open(ctxTargetItem.link, '_blank');
                break;
        }
    });

    // ── Render Feed Items ────────────────────────────────────────
    function renderFeedItems() {
        const feedList = document.getElementById('feedList');
        const countEl = document.getElementById('feedCount');

        // Filter by active categories and selected region
        let filtered = allNewsItems.filter(item => {
            const cats = detectCategories(item.title);
            // Uncategorised items always show
            if (cats.length === 0) return true;
            return cats.some(c => activeCategories.has(c));
        });

        if (selectedRegion) {
            filtered = filtered.filter(item => item.region === selectedRegion);
        }

        // Sort by date descending
        filtered.sort((a, b) => b.date - a.date);

        if (filtered.length === 0) {
            feedList.innerHTML = '<div class="feed-empty">No news items match the current filters.</div>';
            countEl.textContent = '0 items';
            return;
        }

        countEl.textContent = filtered.length + ' item' + (filtered.length !== 1 ? 's' : '');

        feedList.innerHTML = filtered.map(item => {
            const id = generateItemId(item);
            const cats = detectCategories(item.title);
            const region = item.region && REGION_FEEDS[item.region] ? REGION_FEEDS[item.region] : null;
            const bookmarked = typeof isBookmarked === 'function' && isBookmarked(id);
            const starChar = bookmarked ? '&#9733;' : '&#9734;';
            const starClass = bookmarked ? 'feed-star bookmarked' : 'feed-star';

            let badges = cats.map(c => {
                const cat = CATEGORIES[c];
                return '<span class="badge" style="background:' + cat.color + '22;color:' + cat.color + '">' + cat.label + '</span>';
            }).join('');

            let regionBadge = '';
            if (region) {
                regionBadge = '<span class="region-badge" style="background:' + region.color + '22;color:' + region.color + '">' + region.label + '</span>';
            }

            return '<div class="feed-item" data-id="' + id + '" data-region="' + (item.region || '') + '">' +
                '<div class="feed-date">' + formatNewsDate(item.date) + '</div>' +
                '<div class="feed-body">' +
                    '<div class="feed-title"><a href="' + (item.link || '#') + '" target="_blank" rel="noopener">' + escapeHtml(item.title) + '</a></div>' +
                    '<div class="feed-source">' + escapeHtml(item.source || item.feedLabel || '') + '</div>' +
                '</div>' +
                regionBadge +
                '<div class="feed-badges">' + badges + '</div>' +
                '<div class="' + starClass + '" onclick="bookmarkFromFeed(this)" data-id="' + id + '">' + starChar + '</div>' +
            '</div>';
        }).join('');
    }

    // ── Refresh & Last Updated ──────────────────────────────────
    function refreshFeeds() {
        if (selectedRegion) {
            delete regionCache[selectedRegion];
            loadRegionNews(selectedRegion);
        } else {
            regionCache = {};
            loadAllRegionsNews();
        }
    }

    function updateLastRefreshed() {
        const el = document.getElementById('lastUpdated');
        const now = new Date();
        el.textContent = 'Last refreshed: ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    }

    function updateRegionCount(regionKey) {
        const count = (regionCache[regionKey] || []).length;
        if (regionLayers[regionKey]) {
            regionLayers[regionKey].unbindTooltip();
            regionLayers[regionKey].bindTooltip(REGION_FEEDS[regionKey].label + ' (' + count + ')', { sticky: true });
        }
    }

    // ── Auto-Refresh ──────────────────────────────────────────────
    let autoRefreshTimer = null;

    function setupAutoRefresh() {
        const select = document.getElementById('autoRefreshSelect');
        const saved = localStorage.getItem('qc_news_autorefresh') || '0';
        select.value = saved;

        select.addEventListener('change', function() {
            localStorage.setItem('qc_news_autorefresh', this.value);
            clearInterval(autoRefreshTimer);
            autoRefreshTimer = null;
            const interval = parseInt(this.value);
            if (interval > 0) {
                autoRefreshTimer = setInterval(() => refreshFeeds(), interval);
                this.classList.add('active');
            } else {
                this.classList.remove('active');
            }
        });

        const interval = parseInt(saved);
        if (interval > 0) {
            autoRefreshTimer = setInterval(() => refreshFeeds(), interval);
            select.classList.add('active');
        }
    }

    // ── Initialise on DOM Ready ──────────────────────────────────
    document.addEventListener('DOMContentLoaded', function () {
        buildCategoryFilters();
        setupAutoRefresh();
    });
    </script>
</body>
